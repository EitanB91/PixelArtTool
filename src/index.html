<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Pixel Art Tool</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">

        <!-- Top bar -->
        <div id="topbar">
            <span class="app-title">PIXEL ART TOOL</span>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="sprite">Sprite</button>
                <button class="tab-btn" data-tab="animation">Animation</button>
            </div>
            <div class="topbar-controls">
                <label>W: <input type="number" id="canvas-w" value="16" min="1" max="128"> px</label>
                <label>H: <input type="number" id="canvas-h" value="22" min="1" max="128"> px</label>
                <select id="size-preset" title="Dimension presets">
                    <option value="">Custom</option>
                    <option value="16x22" selected>16×22 (player)</option>
                    <option value="16x16">16×16</option>
                    <option value="8x8">8×8</option>
                    <option value="32x32">32×32</option>
                    <option value="64x64">64×64</option>
                </select>
                <label>Zoom: <input type="range" id="zoom-slider" min="2" max="24" value="12"> <span id="zoom-label">12×</span></label>
                <button id="btn-clear">Clear</button>
                <button id="btn-undo">Undo (Z)</button>
                <button id="btn-redo">Redo (Y)</button>
            </div>
        </div>

        <!-- Main layout -->
        <div id="main-layout">

            <!-- Toolbar -->
            <div id="toolbar">
                <button class="tool-btn active" data-tool="pencil" title="Pencil (B)">✏</button>
                <button class="tool-btn" data-tool="eraser"  title="Eraser (E)">◻</button>
                <button class="tool-btn" data-tool="fill"    title="Fill (G)">⬛</button>
                <button class="tool-btn" data-tool="eyedrop" title="Eyedropper (I)">💧</button>
                <hr>
                <div id="current-color-swatch" title="Active color"></div>
                <hr>
                <button class="tool-btn anim-only" data-tool="region-paint" title="Region Paint (available at 24×24+)" disabled>▓</button>
            </div>

            <!-- Drawing canvas area -->
            <div id="canvas-area">
                <canvas id="onionCanvas" class="overlay-canvas"></canvas>
                <canvas id="drawCanvas"></canvas>
                <canvas id="regionCanvas" class="overlay-canvas"></canvas>
            </div>

            <!-- Right panels -->
            <div id="right-panels">

                <!-- Animation panel (visible in Animation mode only) -->
                <div class="panel anim-only" id="animation-panel" style="display:none">
                    <div class="panel-title">ANIMATION</div>

                    <!-- Pose template picker -->
                    <div class="anim-section">
                        <div class="anim-section-label">Character Poses</div>
                        <div class="pose-chips">
                            <button class="pose-chip" data-pose="idle">Idle</button>
                            <button class="pose-chip" data-pose="walk">Walk</button>
                            <button class="pose-chip" data-pose="jump">Jump</button>
                        </div>
                    </div>
                    <div class="anim-section">
                        <div class="anim-section-label">Object / Effect</div>
                        <div class="pose-chips">
                            <button class="pose-chip" data-pose="rotation">Rotation</button>
                            <button class="pose-chip" data-pose="pulse">Pulse</button>
                            <button class="pose-chip" data-pose="flicker">Flicker</button>
                        </div>
                    </div>
                    <button id="btn-apply-template" disabled>Apply Template</button>

                    <!-- Onion skin toggle -->
                    <div class="panel-row">
                        <label><input type="checkbox" id="onion-toggle"> Onion skin</label>
                    </div>

                    <!-- Open Preview button -->
                    <button id="btn-open-preview">Open Preview</button>

                    <!-- Region panel -->
                    <div class="anim-section">
                        <div class="anim-section-label">Regions</div>
                        <div id="region-list">
                            <div class="region-placeholder">No regions defined</div>
                        </div>
                        <button id="btn-new-region" disabled>+ New Region</button>
                    </div>

                    <!-- Background fill control -->
                    <div class="panel-row">
                        <label><input type="checkbox" id="bg-transparent" checked> Transparent BG</label>
                        <input type="color" id="bg-fill-color" value="#000000" disabled title="Background fill color">
                    </div>
                </div>

                <!-- Palette panel -->
                <div class="panel" id="palette-panel">
                    <div class="panel-title">PALETTE</div>
                    <div id="palette-swatches"></div>
                    <div class="panel-row">
                        <input type="color" id="color-picker" value="#1A1A1A">
                        <button id="btn-add-color">+ Add</button>
                    </div>
                </div>

                <!-- Reference panel -->
                <div class="panel" id="reference-panel">
                    <div class="panel-title">REFERENCE</div>
                    <div id="reference-img-wrap">
                        <img id="reference-img" src="" alt="" style="display:none">
                        <div id="reference-placeholder">No reference loaded</div>
                    </div>
                    <div class="panel-row">
                        <button id="btn-extract-palette" disabled title="Extract dominant colors from reference image into palette">Extract Palette</button>
                    </div>
                    <div class="panel-row">
                        <button id="btn-load-ref">Load Image</button>
                        <button id="btn-trace-ref" title="Resize reference image onto canvas (best results: use sprites with transparent background)">Trace</button>
                    </div>
                </div>

                <!-- AI panel -->
                <div class="panel" id="ai-panel">
                    <div class="panel-title">AI GENERATE</div>
                    <textarea id="ai-prompt" placeholder="Describe the sprite... (e.g. 'stone age cave dweller, side view, holding club')"></textarea>
                    <div class="panel-row">
                        <button id="btn-ai-generate">Generate</button>
                        <span id="ai-status"></span>
                    </div>
                    <div class="panel-row">
                        <label title="Automatically reduce palette to 6 colors after generation">
                            <input type="checkbox" id="enforce-toggle" checked> Enforce style
                        </label>
                    </div>
                </div>

                <!-- Export panel -->
                <div class="panel" id="export-panel">
                    <div class="panel-title">EXPORT CODE</div>
                    <div class="panel-row">
                        <label>Func: <input type="text" id="func-name" value="_drawSprite" style="width:120px"></label>
                        <label><input type="checkbox" id="use-loff"> lOff</label>
                    </div>
                    <button id="btn-export">Generate pxAt() Code</button>
                    <button id="btn-copy-code" style="display:none">Copy to Clipboard</button>
                    <button id="btn-save-png">Save PNG</button>
                    <textarea id="export-output" readonly placeholder="pxAt() code will appear here..."></textarea>
                </div>

            </div>
        </div>

        <!-- Bottom bar: frame strip + playback controls (visible in Animation mode only) -->
        <div id="bottom-bar" class="anim-only" style="display:none">
            <div id="playback-controls">
                <button id="btn-prev-frame" title="Previous frame">◀</button>
                <button id="btn-play-pause" title="Play / Pause">▶</button>
                <button id="btn-next-frame" title="Next frame">▶</button>
                <select id="fps-select" title="Frames per second">
                    <option value="1">1 fps</option>
                    <option value="2">2 fps</option>
                    <option value="4" selected>4 fps</option>
                    <option value="6">6 fps</option>
                    <option value="8">8 fps</option>
                    <option value="12">12 fps</option>
                </select>
                <span id="frame-counter">Frame 1 / 1</span>
            </div>
            <div id="frame-strip">
                <div id="frame-strip-scroll">
                    <!-- Frame thumbnails will be rendered here by AnimationPanel -->
                </div>
                <button id="btn-add-frame" title="Add new frame">+</button>
            </div>
        </div>

    </div>

    <!-- Core (no dependencies) -->
    <script src="core/palette.js"></script>
    <script src="core/history.js"></script>
    <script src="core/canvas.js"></script>
    <!-- Animation data model (depends on makeHistory from history.js) -->
    <script src="animation/frames.js"></script>
    <script src="animation/regions.js"></script>
    <script src="animation/pose-templates.js"></script>
    <script src="animation/timeline.js"></script>
    <!-- UI (depends on core + animation) -->
    <script src="ui/toolbar.js"></script>
    <script src="ui/palette-panel.js"></script>
    <script src="ui/reference-panel.js"></script>
    <script src="ui/output-panel.js"></script>
    <script src="ui/animation-panel.js"></script>
    <!-- AI + Export -->
    <script src="ai/client.js"></script>
    <script src="ai/generate.js"></script>
    <script src="ai/enforce.js"></script>
    <script src="export/exporter.js"></script>
    <!-- App entry point (depends on everything above) -->
    <script src="app.js"></script>
</body>
</html>
